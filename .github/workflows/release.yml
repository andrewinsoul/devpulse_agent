name: Build & Release DevPulse

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-x86_64
          - os: macos-14
            target: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: MIX_ENV=prod mix compile

      - name: Build release (Burrito)
        run: |
          MIX_ENV=prod \
          BURRITO_ZIG_VERSION=0.15.2 \
          mix release devpulse --overwrite

      - name: Rename artifact
        run: |
          mv _build/prod/rel/devpulse devpulse-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devpulse-${{ matrix.target }}
          path: devpulse-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/devpulse-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
